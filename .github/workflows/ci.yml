name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m compileall app.py src scripts/demo_e2e.py

      - name: Run demo pipeline
        run: |
          PYTHONPATH=. python scripts/demo_e2e.py

      - name: Show evidence artifacts
        run: |
          ls -lah evidence || true
